<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags (Brand-optimized for "Creator Connect") -->
  <title>Creator Connect — Brand-Creator Collaboration Marketplace | Zero Agency Fees</title>
  <meta name="description"
    content="Creator Connect is India's leading marketplace for brand-creator collaborations. Find vetted creators, run deals with a 7-step tracker, and pay via Razorpay escrow — zero agency fees, zero WhatsApp chaos." />
  <meta name="author" content="Creator Connect" />
  <meta name="keywords"
    content="Creator Connect, creator connect platform, influencer marketing India, brand creator collaboration, influencer marketplace, content creator platform, creator marketplace, brand partnerships, barter deals creators, influencer deal tracker, creator connect tech" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://www.creatorconnect.tech/" />

  <!-- Favicon -->
  <link rel="icon" href="/cc-logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/cc-logo.png" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.creatorconnect.tech/" />
  <meta property="og:site_name" content="Creator Connect" />
  <meta property="og:title" content="Creator Connect — Brand-Creator Collaboration Marketplace" />
  <meta property="og:description"
    content="India's #1 marketplace for brand-creator collaborations. Find vetted creators, run deals with a visual 7-step tracker, and pay via Razorpay escrow. Zero agency fees." />
  <meta property="og:image" content="https://www.creatorconnect.tech/cc-logo.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Creator Connect — Brand-Creator Collaboration Marketplace" />
  <meta name="twitter:description"
    content="Find vetted creators, run deals with a visual tracker, and pay via escrow. Zero agency fees, zero WhatsApp chaos." />
  <meta name="twitter:image" content="https://www.creatorconnect.tech/cc-logo.png" />

  <!-- Additional SEO Signals -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <meta name="theme-color" content="#1e293b" />
  <link rel="dns-prefetch" href="https://www.creatorconnect.tech" />

  <!-- JSON-LD Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Creator Connect",
    "alternateName": "CreatorConnect",
    "url": "https://www.creatorconnect.tech",
    "logo": "https://www.creatorconnect.tech/cc-logo.png",
    "description": "India's leading marketplace for brand-creator collaborations with built-in deal tracking and escrow payments.",
    "foundingDate": "2025",
    "sameAs": [
      "https://www.instagram.com/creatorconnect.tech/"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "creatorconnect.tech@gmail.com",
      "contactType": "customer support"
    }
  }
  </script>

  <!-- JSON-LD Structured Data: WebSite (enables Google Sitelinks Search Box) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Creator Connect",
    "alternateName": "CreatorConnect",
    "url": "https://www.creatorconnect.tech",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://www.creatorconnect.tech/filter?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- JSON-LD Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Creator Connect",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "url": "https://www.creatorconnect.tech",
    "description": "A marketplace platform for brand-creator collaborations featuring a 7-step deal tracker, Razorpay escrow payments, and verified creator profiles.",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "INR",
      "description": "Free to get started. Zero agency fees."
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
